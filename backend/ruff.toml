line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = [
    "E501",  # line too long (black/ruff format handles)
    "B008",  # function call in default argument (common in FastAPI Depends)
]

[lint.per-file-ignores]
"alembic/versions/*" = ["E501", "N999"]
"tests/*" = ["S101"]  # assert ok in tests

[format]
quote-style = "double"
indent-style = "space"
