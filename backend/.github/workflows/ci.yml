name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gr_app
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: gr_db_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Alembic upgrade (CI DB)
        env:
          DATABASE_URL: postgresql+asyncpg://gr_app:ci_password@localhost:5432/gr_db_ci
          JWT_SECRET_KEY: ci-secret-key-long-enough-to-pass-validation
        run: uv run alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://gr_app:ci_password@localhost:5432/gr_db_ci
          JWT_SECRET_KEY: ci-secret-key-long-enough-to-pass-validation
        run: uv run pytest -v
