omissoes_observadas:
  - campo: tab_x_2.tab_x_qt_cota
    descricao: "Quantidade de cotas por classe/serie. Campo opcional no preenchimento. Muitos administradores (ex.: QI Corretora pos-Res.175) deixam NULL. Sem qt_cota nao ha como derivar PL da subclasse (pl = qt * vl)."
    casos_conhecidos:
    - 13.805.152/0001-03 (Puma FIDC NP Multissetorial) -- NULL em toda a serie 2025-02..2026-03
    mitigacao: Mostrar somente vl_cota + nr_cotst na UI; declarar na lista de limitacoes. Rateio por nr_cotst NAO e proxy valido.
  - campo: tab_x_4.tab_x_qt_cota
    descricao: Quantidade de cotas movimentada (captacao/resgate/amortizacao). Mesmo padrao de omissao de tab_x_2.tab_x_qt_cota -- quando o admin nao preenche estoque, tambem nao preenche fluxo.
    casos_conhecidos:
    - 13.805.152/0001-03 (Puma FIDC NP Multissetorial)
    mitigacao: Derivar fluxo em R$ via tab_x_vl_total (sempre populado). Quantidade de cotas movimentadas fica indisponivel.
  - campo: tab_i.tab_i2a12_pr_cedente_{1..9}
    descricao: "Concentracao dos 9 maiores cedentes (% do PL). CVM nao coleta top-10+ nem qualquer informacao dos SACADOS."
    casos_conhecidos:
    - Todos os FIDCs
    mitigacao: Relatorios de agencias (Austin etc.) que citam top-10/20 e sacados usam fonte do ADMINISTRADOR, nao CVM -- irreproduzivel via dado publico.
  - campo: "tab_v.tab_v_b*_vl_inad_*"
    descricao: "Buckets de inadimplencia comecam em 0-30 dias. CVM NAO tem bucket 'ate 15d' (usado por Austin)."
    casos_conhecidos:
    - Esquema CVM -- limitacao estrutural
    mitigacao: "Ficha da UI apresenta os 10 buckets CVM (0-30..>1080) com nota inline."
